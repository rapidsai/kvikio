PluginName: kvikio_nic
FeatureName: Collect KvikIO NIC bandwidth
ExecutablePath: kvikio_nic_nsys_plugin
Description: Per-interface RX/TX network bandwidth from /sys/class/net, as NVTX counter groups.
ExtendedDescription: |
  Command line options:
    -i | --interval  Sampling interval in microseconds (default 50000)
    -d | --device    Interface name regex (default: up or unknown, non-loopback)
    -h | --help      Print this help message

  With no --device filter, all up (or unknown) non-loopback interfaces are monitored.
  A --device regex selects interfaces by name and bypasses the up check, so an explicit
  request is always honored.
ExtendedDescriptionForGui: |
  Options:
    -i | --interval  Sampling interval in microseconds (default 50000)
    -d | --device    Interface name regex (default: up or unknown, non-loopback)
