name: build

on:
  push:
    branches:
      - "main"
      - "release/*"
    tags:
      - v[0-9][0-9].[0-9][0-9].[0-9][0-9]
  workflow_dispatch:
    inputs:
      branch:
        description: |
          branch: git branch the workflow run targets.
          Required even when 'sha' is provided because it is also used for organizing artifacts.
        required: true
        type: string
      date:
        description: "date: Date (YYYY-MM-DD) this run is for. Used to organize artifacts produced by nightly builds"
        required: true
        type: string
      sha:
        description: "sha: full git commit SHA to check out"
        required: true
        type: string
      build_type:
        description: "build_type: one of [branch, nightly, pull-request]"
        type: string
        default: nightly

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  cpp-build:
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
    uses: rapidsai/shared-workflows/.github/workflows/conda-cpp-build.yaml@main
    with:
      build_type: ${{ inputs.build_type || 'branch' }}
      branch: ${{ inputs.branch }}
      node_type: cpu8
      date: ${{ inputs.date }}
      script: ci/build_cpp.sh
      sha: ${{ inputs.sha }}
  python-build:
    needs: [cpp-build]
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
    uses: rapidsai/shared-workflows/.github/workflows/conda-python-build.yaml@main
    with:
      build_type: ${{ inputs.build_type || 'branch' }}
      branch: ${{ inputs.branch }}
      date: ${{ inputs.date }}
      script: ci/build_python.sh
      sha: ${{ inputs.sha }}
      # Build a conda package for each CUDA x ARCH x minimum supported Python version
      matrix_filter: group_by({CUDA_VER, ARCH}) | map(min_by(.PY_VER | split(".") | map(tonumber)))
  upload-conda:
    needs: [cpp-build, python-build]
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
    uses: rapidsai/shared-workflows/.github/workflows/conda-upload-packages.yaml@main
    with:
      build_type: ${{ inputs.build_type || 'branch' }}
      branch: ${{ inputs.branch }}
      date: ${{ inputs.date }}
      sha: ${{ inputs.sha }}
  docs-build:
    if: github.ref_type == 'branch'
    needs: python-build
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
    uses: rapidsai/shared-workflows/.github/workflows/custom-job.yaml@main
    with:
      arch: "amd64"
      branch: ${{ inputs.branch }}
      build_type: ${{ inputs.build_type || 'branch' }}
      container_image: "rapidsai/ci-conda:26.08-latest"
      date: ${{ inputs.date }}
      node_type: "gpu-l4-latest-1"
      script: "ci/build_docs.sh"
      sha: ${{ inputs.sha }}
  wheel-build-cpp:
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
    uses: rapidsai/shared-workflows/.github/workflows/wheels-build.yaml@main
    with:
      matrix_filter: group_by([.ARCH, (.CUDA_VER|split(".")|map(tonumber)|.[0])]) | map(max_by(.PY_VER|split(".")|map(tonumber)))
      build_type: ${{ inputs.build_type || 'branch' }}
      branch: ${{ inputs.branch }}
      sha: ${{ inputs.sha }}
      date: ${{ inputs.date }}
      node_type: cpu8
      script: ci/build_wheel_cpp.sh
      package-name: libkvikio
      package-type: cpp
  wheel-build-python:
    needs: wheel-build-cpp
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
    uses: rapidsai/shared-workflows/.github/workflows/wheels-build.yaml@main
    with:
      build_type: ${{ inputs.build_type || 'branch' }}
      branch: ${{ inputs.branch }}
      sha: ${{ inputs.sha }}
      date: ${{ inputs.date }}
      node_type: cpu8
      script: ci/build_wheel_python.sh
      package-name: kvikio
      package-type: python
      # Build a wheel for each CUDA x ARCH x minimum supported Python version
      matrix_filter: group_by({CUDA_VER, ARCH}) | map(min_by(.PY_VER | split(".") | map(tonumber)))
  release-build-output:
    # One entry represents one existing GitHub Actions artifact bundle. The
    # shared companion derives the built package version and creates an
    # artifact-identity SBOM/provenance envelope when the bundle has not yet
    # supplied richer evidence.
    needs: [cpp-build, python-build, wheel-build-cpp, wheel-build-python]
    permissions:
      actions: read
      contents: read
    secrets: inherit # zizmor: ignore[secrets-inherit]
    strategy:
      matrix:
        include:
          - &conda_cpp_x86_64_cu12
            artifact-name: kvikio_conda_cpp_libkvikio_x86_64_cu12
            release-unit: conda:kvikio
            release-package: '{"ecosystem":"conda","name":"libkvikio"}'
            release-artifacts: '[{"path":"linux-64/libkvikio-*.conda"}]'
          - <<: *conda_cpp_x86_64_cu12
            artifact-name: kvikio_conda_cpp_libkvikio_x86_64_cu13
          - &conda_cpp_aarch64_cu12
            <<: *conda_cpp_x86_64_cu12
            artifact-name: kvikio_conda_cpp_libkvikio_aarch64_cu12
            release-artifacts: '[{"path":"linux-aarch64/libkvikio-*.conda"}]'
          - <<: *conda_cpp_aarch64_cu12
            artifact-name: kvikio_conda_cpp_libkvikio_aarch64_cu13
          - &conda_python_x86_64_cu12
            artifact-name: kvikio_conda_python_kvikio_x86_64_abi3_cu12
            release-unit: conda:kvikio
            release-package: '{"ecosystem":"conda","name":"kvikio"}'
            release-artifacts: '[{"path":"linux-64/kvikio-*.conda"}]'
          - <<: *conda_python_x86_64_cu12
            artifact-name: kvikio_conda_python_kvikio_x86_64_abi3_cu13
          - &conda_python_aarch64_cu12
            <<: *conda_python_x86_64_cu12
            artifact-name: kvikio_conda_python_kvikio_aarch64_abi3_cu12
            release-artifacts: '[{"path":"linux-aarch64/kvikio-*.conda"}]'
          - <<: *conda_python_aarch64_cu12
            artifact-name: kvikio_conda_python_kvikio_aarch64_abi3_cu13
          - &wheel_cpp_x86_64_cu12
            artifact-name: kvikio_wheel_cpp_libkvikio_x86_64_cu12
            release-unit: wheel:kvikio
            release-package: '{"ecosystem":"wheel","name":"libkvikio-cu12"}'
            release-artifacts: '[{"path":"libkvikio_cu12-*.whl"}]'
          - <<: *wheel_cpp_x86_64_cu12
            artifact-name: kvikio_wheel_cpp_libkvikio_x86_64_cu13
            release-package: '{"ecosystem":"wheel","name":"libkvikio-cu13"}'
            release-artifacts: '[{"path":"libkvikio_cu13-*.whl"}]'
          - &wheel_cpp_aarch64_cu12
            <<: *wheel_cpp_x86_64_cu12
            artifact-name: kvikio_wheel_cpp_libkvikio_aarch64_cu12
          - <<: *wheel_cpp_aarch64_cu12
            artifact-name: kvikio_wheel_cpp_libkvikio_aarch64_cu13
            release-package: '{"ecosystem":"wheel","name":"libkvikio-cu13"}'
            release-artifacts: '[{"path":"libkvikio_cu13-*.whl"}]'
          - &wheel_python_x86_64_cu12
            artifact-name: kvikio_wheel_python_kvikio_x86_64_abi3_cu12
            release-unit: wheel:kvikio
            release-package: '{"ecosystem":"wheel","name":"kvikio-cu12"}'
            release-artifacts: '[{"path":"kvikio_cu12-*.whl"}]'
          - <<: *wheel_python_x86_64_cu12
            artifact-name: kvikio_wheel_python_kvikio_x86_64_abi3_cu13
            release-package: '{"ecosystem":"wheel","name":"kvikio-cu13"}'
            release-artifacts: '[{"path":"kvikio_cu13-*.whl"}]'
          - &wheel_python_aarch64_cu12
            <<: *wheel_python_x86_64_cu12
            artifact-name: kvikio_wheel_python_kvikio_aarch64_abi3_cu12
          - <<: *wheel_python_aarch64_cu12
            artifact-name: kvikio_wheel_python_kvikio_aarch64_abi3_cu13
            release-package: '{"ecosystem":"wheel","name":"kvikio-cu13"}'
            release-artifacts: '[{"path":"kvikio_cu13-*.whl"}]'
    uses: rapidsai/shared-workflows/.github/workflows/release-build-output.yaml@main
    with:
      artifact-name: ${{ matrix.artifact-name }}
      release-unit: ${{ matrix.release-unit }}
      release-package: ${{ matrix.release-package }}
      release-artifacts: ${{ matrix.release-artifacts }}
      source-sha: ${{ inputs.sha || github.sha }}
  wheel-publish-cpp:
    needs: wheel-build-cpp
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
    uses: rapidsai/shared-workflows/.github/workflows/wheels-publish.yaml@main
    with:
      build_type: ${{ inputs.build_type || 'branch' }}
      branch: ${{ inputs.branch }}
      sha: ${{ inputs.sha }}
      date: ${{ inputs.date }}
      package-name: libkvikio
      package-type: cpp
      publish-wheel-search-key: kvikio_wheel_cpp_libkvikio
  wheel-publish-python:
    needs: wheel-build-python
    secrets: inherit # zizmor: ignore[secrets-inherit]
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
    uses: rapidsai/shared-workflows/.github/workflows/wheels-publish.yaml@main
    with:
      build_type: ${{ inputs.build_type || 'branch' }}
      branch: ${{ inputs.branch }}
      sha: ${{ inputs.sha }}
      date: ${{ inputs.date }}
      package-name: kvikio
      package-type: python
      publish-wheel-search-key: kvikio_wheel_python_kvikio
  devcontainers:
    name: Build devcontainers
    secrets: inherit  # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/build-devcontainers.yaml@main
    permissions:
      packages: write
    with:
      push: true
      cuda: '["12.9", "13.3"]'
