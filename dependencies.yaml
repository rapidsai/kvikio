# Dependency list for https://github.com/rapidsai/dependency-file-generator
files:
  all:
    output: conda
    matrix:
      cuda: ["12.9", "13.3"]
      arch: [aarch64, x86_64]
    includes:
      - build-universal
      - build-cpp
      - build-py-wrapper
      - checks
      - cuda
      - cuda_version
      - depends_on_cupy
      - depends_on_rapids_logger
      - docs
      - py_version
      - rapids_build_skbuild
      - run
      - test_cpp
      - test_python
  test_cpp:
    output: none
    includes:
      - cuda_version
      - test_libkvikio
      - test_cpp
  test_python:
    output: none
    includes:
      - cuda_version
      - py_version
      - test_kvikio
      - test_python
  checks:
    output: none
    includes:
      - checks
      - py_version
  docs:
    output: none
    includes:
      - cuda_version
      - docs
      - py_version
      - test_kvikio
  py_build_kvikio:
    output: pyproject
    pyproject_dir: python/kvikio
    extras:
      table: build-system
    includes:
      - rapids_build_skbuild
  py_build_libkvikio:
    output: pyproject
    pyproject_dir: python/libkvikio
    extras:
      table: build-system
    includes:
      - rapids_build_skbuild
  py_run_kvikio:
    output: pyproject
    pyproject_dir: python/kvikio
    extras:
      table: project
    includes:
      - depends_on_cupy
      - depends_on_libkvikio
      - run
  py_run_libkvikio:
    output: pyproject
    pyproject_dir: python/libkvikio
    extras:
      table: project
    includes:
      - depends_on_rapids_logger
      - depends_on_cufile
  py_rapids_build_libkvikio:
    output: pyproject
    pyproject_dir: python/libkvikio
    extras:
      table: tool.rapids-build-backend
      key: requires
    includes:
      - build-universal
      - depends_on_rapids_logger
  py_rapids_build_kvikio:
    output: pyproject
    pyproject_dir: python/kvikio
    extras:
      table: tool.rapids-build-backend
      key: requires
    includes:
      - build-universal
      - build-cpp
      - build-py-wrapper
      - build-use-libkvikio-wheel
  py_optional_zarr:
    output: pyproject
    pyproject_dir: python/kvikio
    extras:
      table: project.optional-dependencies
      key: zarr
    includes:
      - zarr
  py_optional_test:
    output: pyproject
    pyproject_dir: python/kvikio
    extras:
      table: project.optional-dependencies
      key: test
    includes:
      - test_python
      - test_cufile
      - zarr
  test_java:
    output: none
    includes:
      - build-universal
      - build-cpp
      - cuda_version
      - cuda
      - test_java
      - depends_on_libkvikio
channels:
  - rapidsai-nightly
  - rapidsai
  - conda-forge
dependencies:
  build-universal:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - &cmake_ver cmake>=4.0
          - ninja
  build-cpp:
    common:
      - output_types: conda
        packages:
          - c-compiler
          - cuda-nvcc
          - cxx-compiler
          - libcurl>=8.13.0,<9.0
    specific:
      - output_types: conda
        matrices:
          - matrix:
              arch: x86_64
            packages:
              - gcc_linux-64=14.*
              - sysroot_linux-64=2.28
          - matrix:
              arch: aarch64
            packages:
              - gcc_linux-aarch64=14.*
              - sysroot_linux-aarch64=2.28
  build-use-libkvikio-wheel:
    common:
      - output_types: conda
        packages: &libkvikio_packages
          - libkvikio==26.8.*,>=0.0.0a0
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - libkvikio-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - libkvikio-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: *libkvikio_packages}
  build-py-wrapper:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - cython>=3.2.2
  checks:
    common:
      - output_types: [conda, requirements]
        packages:
          - pre-commit
  # 'cuda_version' intentionally does not contain fallback entries... we want
  # a loud error if an unsupported 'cuda' value is passed
  cuda_version:
    specific:
      - output_types: conda
        matrices:
          - matrix:
              cuda: "12.2"
            packages:
              - cuda-version=12.2
          - matrix:
              cuda: "12.5"
            packages:
              - cuda-version=12.5
          - matrix:
              cuda: "12.8"
            packages:
              - cuda-version=12.8
          - matrix:
              cuda: "12.9"
            packages:
              - cuda-version=12.9
          - matrix:
              cuda: "13.0"
            packages:
              - cuda-version=13.0
          - matrix:
              cuda: "13.1"
            packages:
              - cuda-version=13.1
          - matrix:
              cuda: "13.2"
            packages:
              - cuda-version=13.2
          - matrix:
              cuda: "13.3"
            packages:
              - cuda-version=13.3
      - output_types: requirements
        matrices:
          # if use_cuda_wheels=false is provided, do not add dependencies on any CUDA wheels
          # (e.g. for DLFW and pip devcontainers)
          - matrix:
              use_cuda_wheels: "false"
            packages:
          - matrix:
              arch: aarch64
              cuda: "12.2"
              use_cuda_wheels: "true"
            packages:
              # some components (like nvidia-cublas-cu12 and nvidia-cuda-nvcc-cu12) didn't have
              # aarch64 wheels until CTK 12.3, so allow a slightly looser bound here
              - cuda-toolkit>=12.2,<12.4
              # Pin the oldest available cuFile wheel, released with CUDA Toolkit 12.6.3.
              - nvidia-cufile-cu12==1.11.1.6.*
          - matrix:
              cuda: "12.2"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.2.*
              # Pin the oldest available cuFile wheel, released with CUDA Toolkit 12.6.3.
              - nvidia-cufile-cu12==1.11.1.6.*
          - matrix:
              cuda: "12.5"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.5.*
              # Pin the oldest available cuFile wheel, released with CUDA Toolkit 12.6.3.
              - nvidia-cufile-cu12==1.11.1.6.*
          - matrix:
              cuda: "12.8"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.8.*
          - matrix:
              cuda: "12.9"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.9.*
          - matrix:
              cuda: "13.0"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.0.*
          - matrix:
              cuda: "13.1"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.1.*
          - matrix:
              cuda: "13.2"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.2.*
          - matrix:
              cuda: "13.3"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.3.*
  cuda:
    common:
      - output_types: conda
        packages:
          - libcufile-dev
          - libnuma
  depends_on_cufile:
    common:
      - output_types: [requirements, pyproject]
        packages:
          - cuda-pathfinder
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          # if use_cuda_wheels=false is provided, do not add dependencies on any CUDA wheels
          # (e.g. for DLFW and pip devcontainers)
          - matrix:
              use_cuda_wheels: "false"
            packages:
          - matrix:
              cuda: "12.*"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit[cufile]==12.*
              # cuda-toolkit before 12.6.3 does not have the `cufile` extra.
              - nvidia-cufile-cu12
              - cuda-pathfinder
          - matrix:
              cuda: "13.*"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit[cufile]==13.*
              - cuda-pathfinder
          - {matrix: null, packages: []}
  depends_on_cupy:
    common:
      - output_types: conda
        packages:
          - &cupy_unsuffixed cupy>=14.0.1,!=14.1.0
    specific:
      - output_types: requirements
        matrices:
          - matrix:
              cuda: "12.*"
            packages:
              - &cupy_cu12 cupy-cuda12x>=14.0.1,!=14.1.0
          # fallback to CUDA 13 versions if 'cuda' is '13.*' or not provided
          - matrix:
            packages:
              - &cupy_cu13 cupy-cuda13x>=14.0.1,!=14.1.0
      - output_types: pyproject
        matrices:
          - matrix:
              cuda: "12.*"
              use_cuda_wheels: "false"
            packages:
              - *cupy_cu12
          - matrix:
              cuda: "13.*"
              use_cuda_wheels: "false"
            packages:
              - *cupy_cu13
          - matrix:
              cuda: "12.*"
            packages:
              - cupy-cuda12x[ctk]>=14.0.1,!=14.1.0
          # fallback to CUDA 13 versions if 'cuda' is '13.*' or not provided
          - matrix:
            packages:
              - cupy-cuda13x[ctk]>=14.0.1,!=14.1.0
  depends_on_libkvikio:
    common:
      - output_types: conda
        packages:
          - &libkvikio_unsuffixed libkvikio==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - libkvikio-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - libkvikio-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*libkvikio_unsuffixed]}
  depends_on_rapids_logger:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - rapids-logger==0.2.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
  docs:
    common:
      - output_types: [conda, requirements]
        packages:
          - numpydoc
          - zarr>=3.0.0,<3.2.0,<4.0.0
          - sphinx
          - sphinx-click
      - output_types: conda
        packages:
          - doxygen=1.9.1 # pre-commit hook needs a specific version.
          - pip:
              - nvidia-sphinx-theme
      - output_types: requirements
        packages:
          - nvidia-sphinx-theme
  py_version:
    specific:
      - output_types: conda
        matrices:
          - matrix:
              py: "3.11"
            packages:
              - python=3.11
          - matrix:
              py: "3.12"
            packages:
              - python=3.12
          - matrix:
              py: "3.13"
            packages:
              - python=3.13
          - matrix:
              py: "3.14"
            packages:
              - python=3.14
          - matrix:
            packages:
              - python>=3.11
  rapids_build_skbuild:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - rapids-build-backend>=0.4.0,<0.5.0
      - output_types: conda
        packages:
          - scikit-build-core>=0.11.0
      - output_types: [requirements, pyproject]
        packages:
          - scikit-build-core[pyproject]>=0.11.0
  run:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - numpy>=2.0,<3.0
          - packaging
  zarr:
    common:
      - output_types: [requirements, pyproject]
        packages:
          - "zarr>=3.0.0,<3.2.0,<4.0.0; python_version >= '3.11'"
  test_libkvikio:
    common:
      - output_types: conda
        packages:
          - libkvikio==26.8.*,>=0.0.0a0
          - libkvikio-tests==26.8.*,>=0.0.0a0
  test_kvikio:
    common:
      - output_types: conda
        packages:
          - libkvikio==26.8.*,>=0.0.0a0
          - kvikio==26.8.*,>=0.0.0a0
  test_cpp:
    common:
      - output_types: conda
        packages:
          - *cmake_ver
  test_python:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - cuda-core>=0.5.1,<2
          - rapids-dask-dependency==26.8.*,>=0.0.0a0
          - pytest
          - pytest-asyncio
          - pytest-cov
          - pytest-timeout
          - rangehttpserver
          - boto3>=1.21.21
      - output_types: pyproject
        packages:
          - &moto_server moto[server]>=4.0.8
      - output_types: conda
        packages:
          - moto>=4.0.8
          - zarr>=3.0.0,<3.2.0,<4.0.0
    specific:
      - output_types: [conda, requirements, pyproject]
        matrices:
          - matrix:
              dependencies: "oldest"
            packages:
              - cuda-core==0.5.1
          - matrix:
            packages:
  test_cufile:
    specific:
      - output_types: pyproject
        matrices:
          # if use_cuda_wheels=false is provided, do not add dependencies on any CUDA wheels
          # (e.g. for DLFW and pip devcontainers)
          - matrix:
              use_cuda_wheels: "false"
            packages:
          - matrix:
            packages:
              - cuda-toolkit[cufile]
      # The `cufile` extra was added to the `cuda-toolkit` metapackage in 12.6.3
      # Adding an explicit test dependency on the cufile package here for
      # testing on versions before 12.6.3
      - output_types: pyproject
        matrices:
          - matrix:
              use_cuda_wheels: "false"
            packages:
          - matrix:
              cuda: "12.*"
              use_cuda_wheels: "true"
            packages:
              - nvidia-cufile-cu12
          - matrix:
            packages:
  test_java:
    common:
      - output_types: conda
        packages:
          - make
          - maven
          - openjdk=11.*
